project_id = "our-pins"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/google/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"

# LINE is wired via Path B (server-side JWT minting) — see app/api/auth/line/.

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/access_token_hook"

[storage]
enabled = true
file_size_limit = "10MiB"

[realtime]
enabled = true
